# SuitUp local runtime - single self-contained container, no external
# databases, no background workers, no cloud services, per architecture.md.

services:
  suitup:
    build:
      context: .
      dockerfile: Dockerfile
    image: suitup:local
    container_name: suitup
    ports:
      - "8092:8092"
    environment:
      - PYTHONUNBUFFERED=1
    restart: unless-stopped